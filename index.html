<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EducatedSuddenBucket - Developer">
    <meta name="author" content="EducatedSuddenBucket">
    <meta property="og:title" content="EducatedSuddenBucket">
    <meta property="og:description" content="A random person on the internet.">
    <meta property="og:image" content="https://esb.is-a.dev/icon.png">
    <meta property="og:url" content="https://esb.is-a.dev/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="EducatedSuddenBucket">
    <link rel="icon" type="image/png" href="https://esb.is-a.dev/icon.png">
    <title>EducatedSuddenBucket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --bg-dark-container: #1e293b;
            --text-dark: #e0e0e0;
            --accent-dark: #64ffda;
            --secondary-dark: #7f5af0;
            --bg-light: #f1f5f9;
            --bg-light-container: #ffffff;
            --text-light: #1a202c;
            --accent-light: #0366d6;
            --secondary-light: #805ad5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-dark);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 40px 20px;
            background-color: var(--bg-dark-container);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-dark);
            font-size: 24px;
            cursor: pointer;
        }

        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px 0;
        }

        .hero {
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--accent-dark), var(--secondary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .projects {
            text-align: center;
        }

        .projects h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .projects .project {
            background-color: var(--bg-dark-container);
            padding: 20px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-icons {
            margin-top: 30px;
        }

        .social-icons a {
            font-size: 28px;
            color: var(--text-dark);
            margin: 0 15px;
            transition: color 0.3s, transform 0.3s;
        }

        .social-icons a:hover {
            color: var(--accent-dark);
            transform: translateY(-5px);
        }

        body.light-mode {
            background-color: var(--bg-light);
            color: var(--text-light);
        }

        body.light-mode .container {
            background-color: var(--bg-light-container);
        }

        body.light-mode .social-icons a {
            color: var(--text-light);
        }

        body.light-mode .social-icons a:hover {
            color: var(--accent-light);
        }

        body.light-mode .hero h1 {
            background: linear-gradient(45deg, var(--accent-light), var(--secondary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.light-mode #theme-toggle {
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.3rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .social-icons a {
                font-size: 24px;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="hero container">
            <button id="theme-toggle">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon">
                    <path d="M21 12.79A9 9 0 0112.21 3a7 7 0 009.79 9.79z"></path>
                </svg>
            </button>
            <h1>EducatedSuddenBucket</h1>
            <p>A random person on the internet.</p>
            <div class="social-icons">
                <a href="#" title="Discord"><i class="fab fa-discord"></i></a>
                <a href="https://github.com/EducatedSuddenBucket" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="mailto:hi@esb.is-a.dev" title="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </section>

        <section class="projects container">
            <h2>Projects</h2>
            <div class="project">
                <h3>HeatBlock</h3>
                <p>A Minecraft server status checker with an API and UI. Fully self-hostable with hosted versions available</p>
                <a href="https://github.com/HeatBlock/HeatBlock">Learn More</a>
            </div>
        </section>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            themeIcon.outerHTML = body.classList.contains('light-mode')
                ? `<svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"></line></svg>`
                : `<svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 0112.21 3a7 7 0 009.79 9.79z"></path></svg>`;
        });
    </script>
</body>
</html>
