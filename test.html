<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO ONE CARES - EducatedSuddenBucket - Home</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background-color: #161b22;
        }
        .top-nav .left, .top-nav .right {
            display: flex;
        }
        .top-nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .top-nav a:hover, .top-nav a.active {
            background-color: #1f2937;
        }
        .top-nav img {
            width: 50px;
            height: 50px;
            margin: 0 10px;
            cursor: pointer;
        }
        .top-nav img:hover {
            filter: brightness(0.8);
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #161b22;
        }
        .info-container {
            margin-top: 20px;
        }
        .intro {
            margin-bottom: 20px;
        }
        .tooltip {
            position: relative;
            display: inline-block;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: black;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            bottom: 125%; /* Position the tooltip above the text */
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
    <script>
        function copyToClipboard(text, message) {
            navigator.clipboard.writeText(text).then(() => {
                alert(message);
            });
        }
    </script>
</head>
<body>
    <div class="top-nav">
        <div class="left">
            <a href="index" class="active">Home</a>
            <a href="network.html">Network</a>
        </div>
        <div class="right">
            <div class="tooltip">
                <img src="https://img.icons8.com/?size=100&id=UWBXWx2eN8Pt&format=png&color=FFFFFF" alt="GitHub" onclick="window.open('https://github.com/EducatedSuddenBucket', '_blank')">
                <span class="tooltiptext">EducatedSuddenBucket</span>
            </div>
            <div class="tooltip">
                <img src="https://img.icons8.com/?size=100&id=85119&format=png&color=FFFFFF" alt="Mail" onclick="copyToClipboard('hi@esb.is-a.dev', 'Email copied to clipboard!')">
                <span class="tooltiptext">hi@esb.is-a.dev</span>
            </div>
            <div class="tooltip">
                <img src="https://img.icons8.com/?size=100&id=25627&format=png&color=FFFFFF" alt="Discord Server" onclick="window.open('https://discord.gg/YOUR_SERVER_INVITE', '_blank')">
                <span class="tooltiptext">Server</span>
            </div>
            <div class="tooltip">
                <img src="https://img.icons8.com/?size=100&id=25627&format=png&color=FFFFFF" alt="Discord Account" onclick="copyToClipboard('educatedsuddenbucket', 'Username copied to clipboard!')">
                <span class="tooltiptext">Account</span>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="info-container">
            <a href="https://discord.com/users/1167825360151380032" target="_blank"><img src="https://lanyard.cnrad.dev/api/1167825360151380032?bg=transparent" alt="Discord Profile"></a>
            <div class="intro">
                <h1>Hey There! I am EducatedSuddenBucket</h1>
            </div>
        </div>
    </div>
</body>
</html>
