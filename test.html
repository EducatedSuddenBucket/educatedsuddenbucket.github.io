<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO ONE CARES - EducatedSuddenBucket - Home</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: transparent; /* Fully transparent background */
        }
        .top-nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 20px;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .top-nav a:hover, .top-nav a.active {
            background-color: #21262d;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .info-container {
            margin-top: 20px;
        }
        .intro {
            margin-bottom: 20px;
        }
        .social-icons {
            display: flex;
            gap: 25px;
        }
        .social-icons i {
            font-size: 36px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .social-icons i:hover {
            color: #58a6ff;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="top-nav">
        <div>
            <a href="index" class="active">Home</a>
            <a href="network.html">Network</a>
        </div>
        <div class="social-icons">
            <i class="fab fa-discord" title="educatedsuddenbucket" onclick="copyDiscordUsername()"></i>
            <i class="fab fa-github" title="EducatedSuddenBucket" onclick="openGitHub()"></i>
            <i class="fas fa-envelope" title="hi@esb.is-a.dev" onclick="copyEmail()"></i>
        </div>
    </div>
    <div class="main-content">
        <div class="info-container">
            <a href="https://discord.com/users/1167825360151380032" target="_blank"><img src="https://lanyard.cnrad.dev/api/1167825360151380032?bg=transparent" alt="Discord Profile"></a>
            <div class="intro">
                <h1>Hey There! I am EducatedSuddenBucket</h1>
            </div>
        </div>
    </div>
    <script>
        function copyDiscordUsername() {
            navigator.clipboard.writeText("educatedsuddenbucket");
            window.alert("Discord username copied!");
        }
        function openGitHub() {
            window.open("https://github.com/EducatedSuddenBucket", "_blank");
        }
        function copyEmail() {
            navigator.clipboard.writeText("hi@esb.is-a.dev");
            window.alert("Email copied!");
        }
    </script>
</body>
</html>
